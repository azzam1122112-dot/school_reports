services:
  - type: web
    name: school-app
    runtime: docker
    envVars:
      - key: ENV
        value: "production"
      - key: DEBUG
        value: "False"
      - key: SITE_URL
        value: "https://school-reports.onrender.com"
      - key: ALLOWED_HOSTS
        value: "school-7lgm.onrender.com,school-reports.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: PRODUCTION_STRICT_MODE
        value: "True"
      - key: WEB_CONCURRENCY
        value: "3"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: GUNICORN_MAX_REQUESTS
        value: "2000"
      - key: GUNICORN_MAX_REQUESTS_JITTER
        value: "200"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_PUBLIC_DOMAIN
        sync: false
      - key: AWS_QUERYSTRING_AUTH
        sync: false

  - type: worker
    name: school-worker
    runtime: docker
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: PRODUCTION_STRICT_MODE
        value: "True"
      - key: CELERY_WORKER_CONCURRENCY
        value: "4"
      - key: CELERY_PREFETCH_MULTIPLIER
        value: "1"
      - key: CELERY_MAX_TASKS_PER_CHILD
        value: "200"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_PUBLIC_DOMAIN
        sync: false
      - key: AWS_QUERYSTRING_AUTH
        sync: false

  - type: worker
    name: school-beat
    runtime: docker
    startCommand: "celery -A config beat --loglevel=info"
    envVars:
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: school-redis
          property: connectionString
      - key: PRODUCTION_STRICT_MODE
        value: "True"
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_PUBLIC_DOMAIN
        sync: false
      - key: AWS_QUERYSTRING_AUTH
        sync: false

  - type: redis
    name: school-redis
    ipAllowList: [] # Only allow internal connections
    plan: starter
